<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Агент 007: Лицензия на шашлык</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0f0a; color:#00ff88; font-family:'Courier New',monospace; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:20px 16px; margin:0; }
    .terminal { width:100%; max-width:500px; background:#0d1a0d; border:2px solid #00ff88; border-radius:12px; padding:24px 20px; box-shadow:0 0 20px rgba(0,255,136,0.2); min-height:80vh; display:flex; flex-direction:column; }
    h1,h2 { text-align:center; font-weight:normal; text-transform:uppercase; letter-spacing:2px; margin-bottom:24px; word-break:break-word; }
    .level-info { font-size:0.9rem; opacity:0.7; margin-bottom:10px; }
    .task-box { background:#00000033; border:1px dashed #00ff88; border-radius:8px; padding:16px; margin-bottom:24px; font-size:1rem; line-height:1.5; word-break:break-word; }
    .task-box a { color:#ffcc00; text-decoration:underline; }
    .task-box img { max-width:100%; border-radius:8px; margin:12px 0; border:1px solid #00ff88; }
    .input-group { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
    input { background:#0d1a0d; border:1px solid #00ff88; color:#00ff88; font-family:inherit; font-size:1.2rem; padding:14px 16px; border-radius:8px; text-align:center; outline:none; letter-spacing:2px; }
    button { background:#00ff88; color:#0a0f0a; border:none; font-family:inherit; font-size:1.2rem; font-weight:bold; text-transform:uppercase; letter-spacing:2px; padding:14px; border-radius:8px; cursor:pointer; }
    button:active { background:#00cc66; }
    .error-message { color:#ff4444; text-align:center; margin-top:8px; font-size:0.9rem; display:none; }
    .final-message { text-align:center; font-size:1.1rem; line-height:1.6; flex-grow:1; display:flex; flex-direction:column; justify-content:center; }
    .footer { margin-top:auto; font-size:0.7rem; text-align:center; opacity:0.6; }
    .reset-hint { margin-top:20px; font-size:0.7rem; color:#00ff8888; text-align:center; }
    .countdown-container,.lore-container { display:flex; flex-direction:column; align-items:center; justify-content:center; flex-grow:1; }
    .countdown-title { font-size:1.4rem; margin-bottom:30px; text-transform:uppercase; letter-spacing:4px; }
    .countdown { display:flex; gap:12px; justify-content:center; margin-bottom:40px; }
    .countdown-item { background:#0a0f0a; border:1px solid #00ff88; border-radius:8px; padding:10px 8px; text-align:center; min-width:60px; }
    .countdown-number { font-size:2.2rem; font-weight:bold; display:block; }
    .countdown-label { font-size:0.7rem; opacity:0.7; text-transform:uppercase; letter-spacing:1px; }
    .countdown-dots { font-size:2rem; display:flex; align-items:center; }
    .lore-text { margin-bottom:30px; line-height:1.6; font-size:1rem; }
    .desktop-warning { display:none; text-align:center; padding:20px; }
    @media (min-width:768px) {
      .terminal { display:none; }
      .desktop-warning { display:block; color:#ff4444; font-size:1.5rem; }
    }
  </style>
</head>
<body>
  <div class="desktop-warning">⛔ МИССИЯ ДОСТУПНА ТОЛЬКО НА МОБИЛЬНОМ УСТРОЙСТВЕ</div>
  <div class="terminal" id="app"></div>

  <script>
    (function() {
      // ===================== НАСТРОЙКИ =====================
      const TARGET_DATE = new Date('2026-06-20T15:00:00'); // ← дата и время начала

      const LORE_TEXT = `
        <p>Секретный канал связи активирован.</p>
        <p>Ты — агент 007, но сегодня твоя миссия — прощание с холостой жизнью.</p>
        <p>Твои друзья подготовили испытания по всему городу. Докажи, что достоин звания «муж».</p>
        <p>В конце дня тебя ждёт убежище с наградой.</p>
        <p>Лицензия на шашлык будет выдана только после прохождения всех уровней.</p>
        <p>Удачи, Сыщик😉.</p>
      `;

      // Уровни: для каждого хранится только SHA-256 хэш правильного кода.
      const levels = [
        {
          title: "МИССИЯ «ПОСЛЕДНИЙ ХОЛОСТОЙ»",
          task: "Введите идентификационный код — самую важную дату в формате ДДММГГГГ.",
          codeHash: "8eb670756b1ff8e671145065d0b9c019de3ce106b3c494bc0b2f1e63c5f96acf", // ← дата свадьбы (29062026)
          hint: "",
          image: null
        },
        {
          title: "Задание 1. Место силы",
          task: "Отправляйтесь туда, где всё началось. Найди место как на картинке. Там находится шифр.",
          codeHash: "a333c379978d711f5a76304ef014e1f5d6749d0259d9945cf5cb3e75c4bdce03", // ← NachaloIstorii29062023
          hint: "Фото ориентира: <br><img src='Снимок экрана 2026-06-12 193330.png' alt='Подсказка'>",
          image: null
        },
        {
          title: "Задание 2. Городской ориентир",
          task: "Памятник Яйцу :)",
          codeHash: "1cc99111b2e43a2743456eec01427ac6e8751b4cce5ad251faf3cde918bfa9fe", // ← ShaltayBoltay1488
          hint: "",
          image: null
        },
        {
          title: "Задание 3. Секретный схрон",
          task: "Металлодетектор в багажнике. СНТ «Виктория» Улица 2-я Учаток 60 (52.098372, 104.347213). Найди контейнер и введи слово из него.",
          codeHash: "f1c9c12649bd712d9e5e7cd8367c27990cfd3ed436e4ce4bf467542d3ce0281c", // ← Shron228
          hint: null,
          image: null
        },
        {
          title: "Задание 4. Перехват на трассе",
          task: "Александровский тракт, ?км - примерно пока в районе снт зеленая горка на столбе будет. Введи слово.",
          codeHash: "7cd314303a2a5c7d0f45775700f4fa6fe47dd39da7a74cc255a0b06b45237314", // ← Kamenka040726
          hint: "Ориентир: снт Зелена горка - столб -?",
          image: null
        },
        {
          title: "Задание 5. Поиск машины — Финиш",
          task: "Найди машину мазда 6 в районе Берёзового. Под дворниками бумажка с номером. Введи код.",
          codeHash: "b29635dd0628f72d2c6fca5ea4707a6787a680812477e43229a1fb5d08b76a86", // ← Kchau99
          hint: "Фото ориентира: <br><img src='https://placehold.co/300x200/0d1a0d/00ff88?text=Фото+башни' alt='Подсказка'>",
          image: null,
          final: true,
          finalMessage: "МИССИЯ ВЫПОЛНЕНА!<br><br>Ты прошёл все испытания, агент.<br>Отправляйся по адресу:<br><strong>Улица Домостроителей, 27, банный комплекс «БанБаныч»</strong><br><br>Шашлык, пиво и парилка ждут тебя!<br>Но перед этим лучше оставить машину дома."
        }
      ];

      // ===================== ХЭШ-ФУНКЦИЯ (SHA-256) =====================
      async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message.toLowerCase().trim());
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }

      // ===================== ХРАНЕНИЕ ПРОГРЕССА =====================
      const STORAGE_KEY = 'bachelorQuestProgress_v2';

      function saveProgress(levelIndex, isFinalDone = false, lorePassed = false) {
        const data = { levelIndex, isFinalDone, lorePassed };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function loadProgress() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return { levelIndex: 0, isFinalDone: false, lorePassed: false };
        try {
          const data = JSON.parse(stored);
          if (data.levelIndex >= 0 && data.levelIndex < levels.length) {
            return {
              levelIndex: data.levelIndex,
              isFinalDone: data.isFinalDone || false,
              lorePassed: data.lorePassed || false
            };
          }
        } catch(e) {}
        return { levelIndex: 0, isFinalDone: false, lorePassed: false };
      }

      function resetProgress() {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }

      // ===================== ЛОГИКА ОТОБРАЖЕНИЯ =====================
      const progress = loadProgress();
      let currentLevel = progress.isFinalDone ? levels.length - 1 : progress.levelIndex;
      const app = document.getElementById('app');
      let countdownInterval = null;

      function renderCountdown() {
        const now = Date.now();
        const target = TARGET_DATE.getTime();
        const diff = target - now;
        if (diff <= 0) {
          if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
          render();
          return;
        }
        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
        const seconds = Math.floor((diff % (1000*60)) / 1000);

        app.innerHTML = `
          <div class="countdown-container">
            <h1>Агент 007: Лицензия на шашлык</h1>
            <div class="countdown-title">До начала миссии</div>
            <div class="countdown">
              <div class="countdown-item"><span class="countdown-number">${String(days).padStart(2,'0')}</span><span class="countdown-label">дней</span></div>
              <div class="countdown-dots">:</div>
              <div class="countdown-item"><span class="countdown-number">${String(hours).padStart(2,'0')}</span><span class="countdown-label">часов</span></div>
              <div class="countdown-dots">:</div>
              <div class="countdown-item"><span class="countdown-number">${String(minutes).padStart(2,'0')}</span><span class="countdown-label">минут</span></div>
              <div class="countdown-dots">:</div>
              <div class="countdown-item"><span class="countdown-number">${String(seconds).padStart(2,'0')}</span><span class="countdown-label">секунд</span></div>
            </div>
            <p style="text-align:center;">Операция «Мальчишник» начнётся 20.06.26 ровно в ${TARGET_DATE.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</p>
            <div class="footer">Ожидайте сигнала...</div>
          </div>`;
        if (!countdownInterval) countdownInterval = setInterval(renderCountdown, 1000);
      }

      function renderLore() {
        app.innerHTML = `
          <div class="lore-container">
            <h1>Агент 007: Лицензия на шашлык</h1>
            <div class="lore-text">${LORE_TEXT}</div>
            <button id="startMissionBtn" class="lore-button">Начать миссию</button>
            <div class="footer">Связь установлена</div>
          </div>`;
        document.getElementById('startMissionBtn').addEventListener('click', () => {
          progress.lorePassed = true;
          saveProgress(0, false, true);
          render();
        });
      }

      async function render() {
        if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        const level = levels[currentLevel];

        // Финал
        if (level.final && progress.isFinalDone) {
          app.innerHTML = `
            <div class="final-message">
              <h2>${level.finalMessage.split('<br><br>')[0]}</h2>
              <p>${level.finalMessage}</p>
            </div>
            <div class="reset-hint">(долгое нажатие здесь для сброса)</div>`;
          const finalDiv = app.querySelector('.final-message');
          let timer;
          finalDiv.addEventListener('touchstart', ()=> { timer = setTimeout(()=>{ if(confirm('Сбросить прогресс?')) resetProgress(); }, 2000); });
          finalDiv.addEventListener('touchend', ()=> clearTimeout(timer));
          finalDiv.addEventListener('touchmove', ()=> clearTimeout(timer));
          return;
        }

        // Стартовый экран с проверкой времени и лором
        if (currentLevel === 0 && !progress.isFinalDone) {
          if (Date.now() < TARGET_DATE.getTime()) {
            renderCountdown();
            return;
          }
          if (!progress.lorePassed) {
            renderLore();
            return;
          }
        }

        // Обычный уровень
        let html = `
          <div class="level-info">Уровень ${currentLevel+1} из ${levels.length}</div>
          <h2>${level.title}</h2>
          <div class="task-box">
            <p>${level.task}</p>
            ${level.image ? `<img src="${level.image}" alt="Подсказка">` : ''}
            ${level.hint ? `<p style="margin-top:12px;font-size:0.9rem;opacity:0.8;">${level.hint}</p>` : ''}
          </div>
          <div class="input-group">
            <input type="text" id="codeInput" placeholder="Введи код" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button id="submitBtn">Проверить</button>
            <div id="errorMsg" class="error-message">Неверный код, агент. Попробуй ещё раз.</div>
          </div>
          <div class="footer">МИССИЯ АКТИВНА • ПОМОЩЬ БЛИЗКА</div>
          <div class="reset-hint">(долгое нажатие на заголовок для сброса)</div>`;
        app.innerHTML = html;

        // Долгое нажатие для сброса
        const titleEl = app.querySelector('h2');
        if (titleEl) {
          let timer;
          titleEl.addEventListener('touchstart', ()=> { timer = setTimeout(()=>{ if(confirm('Сбросить прогресс?')) resetProgress(); }, 2000); });
          titleEl.addEventListener('touchend', ()=> clearTimeout(timer));
          titleEl.addEventListener('touchmove', ()=> clearTimeout(timer));
        }

        const input = document.getElementById('codeInput');
        const btn = document.getElementById('submitBtn');
        const error = document.getElementById('errorMsg');

        async function check() {
          const userInput = input.value.trim();
          if (!userInput) return;
          const inputHash = await sha256(userInput);
          if (inputHash === level.codeHash) {
            if (level.final) {
              progress.isFinalDone = true;
              saveProgress(currentLevel, true, progress.lorePassed);
              render();
            } else {
              currentLevel++;
              saveProgress(currentLevel, false, progress.lorePassed);
              render();
            }
          } else {
            error.style.display = 'block';
            input.classList.add('error-shake');
            setTimeout(() => {
              error.style.display = 'none';
              input.classList.remove('error-shake');
            }, 2000);
          }
        }

        btn.addEventListener('click', check);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') check(); });
        input.focus();
      }

      // Анимация ошибки
      const style = document.createElement('style');
      style.textContent = `.error-shake{animation:shake 0.3s;border-color:#ff4444!important}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`;
      document.head.appendChild(style);

      render();
    })();
  </script>
</body>
</html>
